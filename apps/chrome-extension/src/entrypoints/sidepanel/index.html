<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summarize</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <div class="headerRow">
        <div class="brand">
          <div id="title" class="title" data-i18n="appTitle">Summarize</div>
          <div id="subtitle" class="subtitle"></div>
        </div>
        <div class="controls">
          <div id="summarizeControlRoot" class="summarizeControlRoot"></div>
          <button
            id="drawerToggle"
            type="button"
            class="ghost icon"
            aria-label="Settings"
            data-i18n-aria="settings"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.18 7.18 0 0 0-1.63-.94l-.36-2.54A.5.5 0 0 0 13.9 1h-3.8a.5.5 0 0 0-.49.42l-.36 2.54c-.58.23-1.12.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 7.48a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94L2.83 14.52a.5.5 0 0 0-.12.64l1.92 3.32c.13.22.39.3.6.22l2.39-.96c.51.4 1.05.71 1.63.94l.36 2.54c.04.24.25.42.49.42h3.8c.24 0 .45-.18.49-.42l.36-2.54c.58-.23 1.12-.54 1.63-.94l2.39.96c.22.09.47 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"
              />
            </svg>
          </button>
        </div>
      </div>
      <div id="progress" class="progress" aria-hidden="true">
        <div id="progressFill" class="progressFill"></div>
      </div>
      <div id="slideNotice" class="slideNotice hidden" role="status" aria-live="polite">
        <span id="slideNoticeMessage" class="slideNotice__message"></span>
        <div class="slideNotice__actions">
          <button id="slideNoticeRetry" type="button" class="ghost small" data-i18n="tryAgain">
            Try again
          </button>
        </div>
      </div>
      <div id="error" class="error hidden" role="status" aria-live="polite">
        <div class="error__content">
          <div class="error__title" data-i18n="errorTitle">Something went wrong</div>
          <p id="errorMessage" class="error__message"></p>
        </div>
        <div class="error__actions">
          <button id="errorRetry" type="button" class="ghost small" data-i18n="tryAgain">
            Try again
          </button>
          <button id="errorLogs" type="button" class="ghost small" data-i18n="viewLogs">
            View logs
          </button>
        </div>
      </div>
    </header>

    <section id="drawer" class="drawer hidden" aria-label="Controls" data-i18n-aria="controls">
      <div class="drawerGrid">
        <div id="pickersRoot"></div>
        <div id="lengthRoot"></div>
        <div class="size">
          <span data-i18n="size">Size</span>
          <div class="sizeControl" role="group" aria-label="Text size" data-i18n-aria="textSize">
            <button
              id="sizeSm"
              type="button"
              class="ghost sizeBtn"
              aria-label="Smaller text"
              data-i18n-aria="smallerText"
            >
              A
            </button>
            <span class="sizeDivider" aria-hidden="true"></span>
            <button
              id="sizeLg"
              type="button"
              class="ghost sizeBtn sizeBtnLg"
              aria-label="Larger text"
              data-i18n-aria="largerText"
            >
              A
            </button>
          </div>
        </div>
        <div class="lineHeight">
          <span data-i18n="line">Line</span>
          <div
            class="lineHeightControl"
            role="group"
            aria-label="Line height"
            data-i18n-aria="lineHeight"
          >
            <button
              id="lineTight"
              type="button"
              class="ghost lineHeightBtn"
              aria-label="Tighter line height"
              data-i18n-aria="tighterLineHeight"
            >
              <svg class="lineIcon lineIconTight" viewBox="0 0 16 12" aria-hidden="true">
                <path d="M2 2H14M2 5H14M2 8H14" />
              </svg>
            </button>
            <span class="sizeDivider" aria-hidden="true"></span>
            <button
              id="lineLoose"
              type="button"
              class="ghost lineHeightBtn"
              aria-label="Looser line height"
              data-i18n-aria="looserLineHeight"
            >
              <svg class="lineIcon lineIconLoose" viewBox="0 0 16 12" aria-hidden="true">
                <path d="M2 1H14M2 6H14M2 11H14" />
              </svg>
            </button>
          </div>
        </div>
        <label class="wide uiLanguage">
          <span data-i18n="uiLanguage">UI language</span>
          <select id="uiLanguage">
            <option value="zh-tw" data-i18n="traditionalChinese">繁體中文</option>
            <option value="en" data-i18n="english">English</option>
          </select>
        </label>
      </div>

      <details id="advancedSettings" class="drawerAdvanced">
        <summary data-i18n="advanced">Advanced</summary>
        <div class="drawerAdvancedBody">
          <label class="wide">
            <span data-i18n="model">Model</span>
            <div id="modelRow" class="combo modelRow">
              <select id="modelPreset">
                <option value="auto" data-i18n="auto">Auto</option>
                <option value="gpt-fast">GPT Fast</option>
                <option value="free" data-i18n="free">Free</option>
                <option value="custom" data-i18n="custom">Custom…</option>
              </select>
              <input
                id="modelCustom"
                type="text"
                placeholder="custom model id"
                data-i18n-placeholder="customModelPlaceholder"
                autocapitalize="off"
                autocomplete="off"
                spellcheck="false"
                hidden
              />
              <button
                id="modelRefresh"
                type="button"
                class="ghost small"
                title="Refresh free models"
                data-i18n-title="refreshFreeModels"
              >
                <span data-i18n="scanFree">Scan free</span>
              </button>
            </div>
            <div id="modelStatus" class="modelStatus" role="status" aria-live="polite"></div>
          </label>
          <label class="wide">
            <span data-i18n="slidesView">Slides view</span>
            <select id="slidesLayout">
              <option value="strip" data-i18n="summaryStrip">Summary + strip</option>
              <option value="gallery" data-i18n="slidesOnly">Slides only</option>
            </select>
          </label>
          <div class="drawerAdvancedRow">
            <div class="drawerActions drawerAdvancedActions">
              <div id="autoToggle" class="toggleRow"></div>
              <div class="drawerAdvancedButtons">
                <button
                  id="refresh"
                  type="button"
                  class="ghost"
                  title="Refresh (Shift+Enter)"
                  data-i18n-title="refreshTitle"
                >
                  <span data-i18n="refresh">Refresh</span>
                </button>
                <button
                  id="clear"
                  type="button"
                  class="ghost"
                  title="Clear summary + chat"
                  data-i18n-title="clearTitle"
                >
                  <span data-i18n="clear">Clear</span>
                </button>
                <button id="advanced" type="button" class="ghost" data-i18n="advanced">
                  Advanced
                </button>
              </div>
            </div>
          </div>
        </div>
      </details>
    </section>

    <main>
      <div id="setup" class="setup hidden"></div>
      <article id="render" class="render"></article>
      <pre id="raw" class="raw hidden"></pre>

      <div id="metricsHome">
        <div id="metrics" class="metrics hidden"></div>
      </div>

      <section id="chatContainer" class="chatContainer">
        <div id="chatMessages" class="chatMessages isHidden"></div>
        <div id="chatContextStatus" class="chatContextStatus isHidden"></div>
        <div id="automationNotice" class="automationNotice hidden" role="status" aria-live="polite">
          <div id="automationNoticeTitle" class="automationNotice__title"></div>
          <div id="automationNoticeMessage" class="automationNotice__message"></div>
          <div class="automationNotice__actions">
            <button id="automationNoticeAction" type="button" class="ghost small">
              <span data-i18n="openExtensionDetails">Open extension details</span>
            </button>
          </div>
        </div>
        <div id="chatMetricsSlot" class="chatMetricsSlot"></div>
      </section>
    </main>

    <div id="chatDock" class="chatDock">
      <button
        id="chatJump"
        type="button"
        class="chatJump"
        aria-label="Jump to latest"
        data-i18n="jumpLatest"
        data-i18n-aria="jumpLatest"
      >
        Jump to latest
      </button>
      <div id="chatQueue" class="chatQueue isHidden" aria-live="polite"></div>
      <div id="inlineError" class="inlineError hidden" role="alert">
        <div class="inlineError__content">
          <div class="inlineError__text" id="inlineErrorMessage"></div>
          <div class="inlineError__actions">
            <button id="inlineErrorRetry" type="button" class="ghost small" data-i18n="tryAgain">
              Try again
            </button>
            <button id="inlineErrorLogs" type="button" class="ghost small" data-i18n="viewLogs">
              View logs
            </button>
          </div>
        </div>
        <button
          id="inlineErrorClose"
          type="button"
          class="ghost inlineError__close"
          aria-label="Dismiss error"
          data-i18n-aria="dismissError"
        >
          ✕
        </button>
      </div>
      <div class="chatInputRow">
        <textarea
          id="chatInput"
          class="chatInput"
          placeholder="Ask about this page..."
          data-i18n-placeholder="chatPlaceholder"
          rows="1"
        ></textarea>
        <button
          id="chatSend"
          type="button"
          class="ghost chatSendBtn"
          aria-label="Send"
          data-i18n-aria="send"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
          </svg>
        </button>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
